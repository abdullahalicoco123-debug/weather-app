<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title> 

    <link rel="stylesheet" href="style.css">
</head>

<body>

   <div class = "header">

    <h1 class = "name">Weather App</h1>

    <p class = "tagline">Know the weather anywhere</p>

   </div>

   <div class = "Search-Section">

        <input id="search-box" type="text" class = "search-box" placeholder = "Enter City Name">

        <button id="search-btn" class = "search-btn">Search</button>

     </div>

     <div class = "weather-info">
        <div class="weather-icon">
        ☀️
    </div>
    <h2 id="city-name" class="city-name">Islamabad</h2>
    <p id="temperature" class="temperature">25°C</p>
    <p id="humidity" class="humidity">Humidity: 60%</p>
    <p id="wind-speed" class="wind-speed">Wind Speed: 10 km/h</p>
    
    

     </div>

</body>

    <script src="script.js"></script>

    

</html>
